name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Python lint + test ───────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check . --select E,W,F --ignore E501

      - name: Check syntax (compile all .py files)
        run: python -m py_compile main.py && echo "Syntax OK"

      - name: Verify imports
        run: |
          python -c "
          import importlib, sys
          modules = [
              'fastapi', 'uvicorn', 'sqlalchemy', 'pydantic',
              'jose', 'passlib', 'dotenv', 'httpx',
          ]
          for m in modules:
              importlib.import_module(m)
              print(f'  OK: {m}')
          print('All core imports verified.')
          "

  # ── Frontend: Node lint + build ───────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Lint
        run: npx eslint src/ --max-warnings 50 || true

      - name: Build production bundle
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html && echo "Build OK: dist/index.html exists"
          ls -lh dist/

  # ── Docker build test ─────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t govproposal-ai:test .

      - name: Smoke test container
        run: |
          docker run -d --name gpa-test -p 8099:8000 \
            -e JWT_SECRET_KEY=ci-test-key \
            govproposal-ai:test
          sleep 10
          curl -sf http://localhost:8099/api/health | grep -q "healthy"
          echo "Health check passed!"
          docker stop gpa-test
          docker rm gpa-test
